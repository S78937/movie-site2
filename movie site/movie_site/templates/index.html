<!DOCTYPE html>
<html>
<head>
    <title>电影排行榜</title>
</head>

<body style="font-family: Arial; background:#f5f5f5; padding:40px;">

    <h1 style="text-align:center;">🎬 电影排行榜</h1>

    <div style="width:500px; margin:0 auto; background:white; padding:20px; border-radius:10px;">

        <form action="/add" method="post" style="text-align:center;">
            <input type="text" name="name" placeholder="输入电影名" required
                   style="padding:8px; width:70%;">
            <button type="submit" style="padding:8px 15px;">添加</button>
        </form>

        <hr>

        <ol style="padding-left:20px;">
        {% for movie in movies %}
            <li style="margin:10px 0; padding:10px; border-bottom:1px solid #eee;">
                <b>{{ movie[1] }}</b><br>

                ⭐ 评分：{{ "%.1f"|format(movie[2]) }}  
                👥 {{ movie[3] }}人评分  

                <br>

                <a href="/rate/{{ movie[0] }}">👉 去评分</a>
            </li>
        {% endfor %}
        </ol>

    </div>

</body>
</html>
